<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恐怖の森</title>

<style>
body{
margin:0;
background:#222;
color:white;
text-align:center;
font-family:sans-serif;
}

canvas{
border:3px solid white;
background:#2f5e2f;
}
</style>
</head>

<body>

<h1>恐怖の森</h1>
<p>矢印キーで逃げろ（30秒生き残れ）</p>
<p id="timer">残り時間: 30</p>

<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player={x:100,y:200,size:12};
let enemy={x:500,y:200,size:15,speed:1};

let time=30;

setInterval(()=>{
time--;
document.getElementById("timer").textContent="残り時間: "+time;

if(time<=0){
alert("30秒生き残った！クリア！");
location.reload();
}
},1000);

let trees=[];
for(let i=0;i<35;i++){
trees.push({x:Math.random()*600,y:Math.random()*400,size:14});
}

let keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function collision(x,y,size){
for(let t of trees){
let dx=x-t.x;
let dy=y-t.y;
let dist=Math.sqrt(dx*dx+dy*dy);
if(dist < size + t.size){
return true;
}
}
return false;
}

function update(){

let newX=player.x;
let newY=player.y;

if(keys["ArrowUp"]) newY-=3;
if(keys["ArrowDown"]) newY+=3;
if(keys["ArrowLeft"]) newX-=3;
if(keys["ArrowRight"]) newX+=3;

if(!collision(newX,newY,player.size)){
player.x=newX;
player.y=newY;
}

/* 敵の移動 */
let dx=player.x-enemy.x;
let dy=player.y-enemy.y;
let dist=Math.sqrt(dx*dx+dy*dy);

let nextX=enemy.x + dx/dist*enemy.speed;
let nextY=enemy.y + dy/dist*enemy.speed;

if(!collision(nextX,nextY,enemy.size)){
enemy.x=nextX;
enemy.y=nextY;
}

if(dist < player.size + enemy.size){
alert("捕まった...");
location.reload();
}

}

function draw(){

ctx.clearRect(0,0,600,400);

ctx.fillStyle="#1f7a1f";
trees.forEach(t=>{
ctx.beginPath();
ctx.arc(t.x,t.y,t.size,0,Math.PI*2);
ctx.fill();
});

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(enemy.x,enemy.y,enemy.size,0,Math.PI*2);
ctx.fill();

}

function gameLoop(){
update();
draw();
requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
